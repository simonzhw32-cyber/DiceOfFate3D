name: Build EXE

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pygame PyOpenGL numpy pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --noconsole --name "DiceOfFate3D" main.py

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/DiceOfFate3D.exe
          name: "骰子命运 3D ${{ github.ref_name }}"
          body: |
            ## 骰子命运 3D ${{ github.ref_name }}

            > 命运的骰子已经落下——你的结局，由天定。

            受《博德之门 3》启发，一款 3D D20 判定系统。在华丽的宝石色二十面体上掷出你的命运。

            ### 玩法
            1. 在左侧输入框写下你想做的事（支持中文）
            2. 点击「投骰子」或按 Enter
            3. 看骰子飞出、弹跳、落定——等待命运宣判

            ### 判定结果
            | 点数 | 结果 |
            |------|------|
            | 1–5  | 💀 大失败 |
            | 6–9  | ❌ 失败 |
            | 10–14 | ✅ 成功 |
            | 15–19 | ⭐ 大成功 |
            | 20   | 👑 必杀成功 |

            ### 下载运行
            下载 `DiceOfFate3D.exe`，双击直接运行，无需安装 Python 或任何依赖。

            **系统要求：** Windows 10+，需要显卡驱动支持 OpenGL
